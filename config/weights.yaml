# Mid-term configuration weights (MVP default)
modules:
  china_demand: 0.30
  inventory: 0.25
  macro_liquidity: 0.20
  global_cycle: 0.10
  supply: 0.10
  trend: 0.05

direction_thresholds:
  strong_bullish: 0.50
  bullish: 0.20
  bearish: -0.20
  strong_bearish: -0.50

module_active_threshold: 0.20

# When confidence falls below this, or A/B cross-validation diverges, the
# headline direction is downgraded to a hedged/neutral stance (P1 fix).
low_confidence_threshold: 0.25

confidence:
  data_quality_weights:
    source: 0.4
    freshness: 0.3
    cross_check: 0.2
    completeness: 0.1

cross_validation:
  groups:
    A_fundamental_spot:
      label: 基本面/现货组
      modules:
        - china_demand
        - inventory
        - supply
    B_macro_price:
      label: 宏观/价格组
      modules:
        - macro_liquidity
        - global_cycle
        - trend
