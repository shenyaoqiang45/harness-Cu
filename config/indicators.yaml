# Indicator → module mapping and metadata
modules:
  trend:
    indicators:
      - lme_copper_price
  inventory:
    indicators:
      - lme_inventory
      - shfe_inventory
      - comex_inventory
      - spot_premium
      - term_structure
  china_demand:
    indicators:
      - china_pmi
      - china_new_orders_pmi
      - social_financing
      - m1
      - grid_investment
      - grid_investment_amount
      - grid_investment_monthly_amount
      - grid_project_new_starts
      - uhv_approved_projects
      - grid_tender_value
      - transformer_tender_value
      - wire_cable_output_yoy
      - copper_rod_operating_rate
      - power_consumption_yoy
      - new_energy_grid_connection
  macro_liquidity:
    indicators:
      - dxy
      - us_10y_real_rate
  global_cycle:
    indicators:
      - us_ism_manufacturing
      - global_manufacturing_pmi
      - korea_exports_yoy
  supply:
    indicators:
      - tc_rc_spot
    events_file: data/raw/supply_events.csv

units:
  lme_copper_price: USD/ton
  # Inventory: all stored as metric ton (公吨); SHFE 吨 ≡ 公吨; COMEX official short ton converted on ingest
  lme_inventory: ton
  shfe_inventory: ton
  comex_inventory: ton
  spot_premium: USD/ton
  term_structure: label
  china_pmi: index
  china_new_orders_pmi: index
  social_financing: CNY_bn
  m1: CNY_bn
  grid_investment: pct
  grid_investment_amount: CNY_100m
  grid_investment_monthly_amount: CNY_100m
  grid_project_new_starts: count
  uhv_approved_projects: CNY_100m
  grid_tender_value: CNY_100m
  transformer_tender_value: CNY_100m
  wire_cable_output_yoy: pct
  copper_rod_operating_rate: pct
  power_consumption_yoy: pct
  new_energy_grid_connection: 10kW
  dxy: index
  us_10y_real_rate: pct
  us_ism_manufacturing: index
  global_manufacturing_pmi: index
  korea_exports_yoy: pct
  tc_rc_spot: USD/ton

frequencies:
  lme_copper_price: daily
  lme_inventory: daily
  shfe_inventory: daily
  comex_inventory: daily
  spot_premium: daily
  term_structure: daily
  china_pmi: monthly
  china_new_orders_pmi: monthly
  social_financing: monthly
  m1: monthly
  grid_investment: monthly
  grid_investment_amount: monthly
  grid_investment_monthly_amount: monthly
  grid_project_new_starts: annual_plan
  uhv_approved_projects: semiannual
  grid_tender_value: batch
  transformer_tender_value: batch
  wire_cable_output_yoy: monthly
  copper_rod_operating_rate: weekly
  power_consumption_yoy: monthly
  new_energy_grid_connection: monthly
  dxy: daily
  us_10y_real_rate: daily
  us_ism_manufacturing: monthly
  global_manufacturing_pmi: monthly
  korea_exports_yoy: monthly
  tc_rc_spot: monthly
