# Data source registry for live fetching
lookback_days: 400

sources:
  yahoo:
    enabled: true
    indicators:
      lme_copper_price:
        ticker: "HG=F"
        transform: "comex_lb_to_usd_ton"
        unit: USD/ton
        frequency: daily
        source: Yahoo Finance
        source_url: https://finance.yahoo.com/quote/HG=F
        confidence: B
        note: "COMEX front-month proxy for LME copper (USD/ton)"
      dxy:
        ticker: "DX-Y.NYB"
        unit: index
        frequency: daily
        source: Yahoo Finance
        source_url: https://finance.yahoo.com/quote/DX-Y.NYB
        confidence: B

  fred:
    enabled: true
    indicators:
      us_10y_real_rate:
        series_id: DFII10
        unit: pct
        frequency: daily
        source: FRED
        source_url: https://fred.stlouisfed.org/series/DFII10
        confidence: A

  eastmoney:
    enabled: true
    indicators:
      china_pmi:
        report: RPT_ECONOMY_PMI
        date_col: REPORT_DATE
        value_col: MAKE_INDEX
        unit: index
        frequency: monthly
        source: 东方财富-国家统计局
        source_url: https://data.eastmoney.com/cjsj/pmi.html
        confidence: A
      lme_inventory:
        report: RPT_METAL_LME
        transform: lme_copper_stock
        unit: ton
        frequency: daily
        source: 东方财富-LME
        source_url: https://www.lme.com/Market-data/Reports-and-data/Warehouse-and-stock-reports
        confidence: A
        note: "LME copper warehouse stocks (metric ton); Eastmoney mirror of LME official daily report"

  akshare:
    enabled: true
    indicators:
      china_new_orders_pmi:
        func: index_pmi_man_cx
        date_col: 日期
        value_col: 制造业PMI
        unit: index
        frequency: monthly
        source: 财新网
        source_url: https://www.caixin.com/
        confidence: C
        note: "Historical fallback; recent months overridden by NBS new-orders sub-index in manual_indicators.csv"
      shfe_inventory:
        func: futures_inventory_em
        kwargs: { symbol: "沪铜" }
        date_col: 日期
        value_col: 库存
        unit: ton
        frequency: daily
        source: 东方财富-SHFE
        source_url: https://www.shfe.com.cn/reports/businessdata/prmsummary/
        confidence: A
        note: "SHFE copper warehouse receipt / inventory daily (ton); Eastmoney mirror of SHFE official"
      social_financing:
        func: macro_china_new_financial_credit
        date_col: 月份
        value_col: 当月
        transform: parse_cn_month
        unit: CNY_bn
        frequency: monthly
        source: 东方财富-社融
        source_url: https://data.eastmoney.com/cjsj/xzxd.html
        confidence: A
      m1:
        func: macro_china_money_supply
        date_col: 月份
        value_col: 货币(M1)-数量(亿元)
        transform: parse_cn_month
        unit: CNY_bn
        frequency: monthly
        source: 东方财富-货币供应
        source_url: https://data.eastmoney.com/cjsj/hbgyl.html
        confidence: A
      grid_investment:
        func: macro_china_gdzctz
        date_col: 月份
        value_col: 同比增长
        transform: parse_cn_month
        unit: pct
        frequency: monthly
        source: 东方财富-固定资产投资代理
        source_url: https://data.eastmoney.com/cjsj/gdzctz.html
        confidence: C
        note: "Broad fixed-asset investment YoY proxy; prefer manual CEC/NEA/SGCC grid engineering investment YoY when available"
      korea_exports_yoy:
        func: fred_korea_exports_yoy
        unit: pct
        frequency: monthly
        source: FRED
        source_url: https://fred.stlouisfed.org/series/XTEXVA01KRM667S
        confidence: B

  cme:
    enabled: true
    indicators:
      comex_inventory:
        unit: ton
        frequency: daily
        source: CME Group
        source_url: https://www.cmegroup.com/delivery_reports/Copper_Stocks.xls
        confidence: A
        note: "COMEX high-grade copper warehouse stocks; official report in short tons, stored as metric ton (×0.90718474)"

  derived:
    enabled: true
    indicators:
      spot_premium:
        func: shfe_lme_premium
        unit: USD/ton
        frequency: daily
        source: derived
        source_url: ""
        confidence: C
      term_structure:
        func: premium_to_curve
        unit: label
        frequency: daily
        source: derived
        source_url: ""
        confidence: C
      global_manufacturing_pmi:
        func: composite_global_pmi
        unit: index
        frequency: monthly
        source: derived
        source_url: ""
        confidence: C

manual:
  path: data/raw/manual_indicators.csv
  description: "Monthly/daily overrides for series blocked by network or licensing"

inventory_monitor:
  enabled: true
  path: data/raw/metal_inventory_monitor.csv
  description: "When present, LME/SHFE/COMEX inventory comes only from this monitor table"

optional:
  - tc_rc_spot
  - us_ism_manufacturing
